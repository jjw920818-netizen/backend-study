services:
  api:
    build: ./api # . 현재경로  / ./api 이경로에서 찾아라
    ports:
      - "80:8000" 
    depends_on:
      - db
      - redis
    volumes:
      - ./api:/app # ✔️ ./api로
  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: oz
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  worker:
    build: ./worker
    volumes:
      - ./worker:/app
    depends_on:
      - redis
  redis:
    image: redis:8

volumes:
  db_data:

